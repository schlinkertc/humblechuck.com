name: Deploy to AWS

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pytest
      - run: uv run python -m site_builder.build
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Verify personal AWS account
        shell: bash
        run: |
          actual_account="$(aws sts get-caller-identity --query Account --output text)"
          if [[ "$actual_account" != "559681045665" || "${{ vars.AWS_ACCOUNT_ID }}" != "559681045665" ]]; then
            echo "Refusing to deploy: expected personal AWS account 559681045665, got $actual_account."
            exit 1
          fi
      - name: Ensure CDK is bootstrapped
        run: >-
          uv run npx --yes aws-cdk@2.1131.0 bootstrap
          aws://${{ vars.AWS_ACCOUNT_ID }}/us-east-1
          --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess
      - name: Deploy site
        run: >-
          uv run npx --yes aws-cdk@2.1131.0 deploy HumbleChuckSite
          --require-approval never
          -c account=${{ vars.AWS_ACCOUNT_ID }}
          -c region=us-east-1
          -c enable_domain=${{ vars.ENABLE_DOMAIN || 'false' }}
