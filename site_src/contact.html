<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="$introduction">
    <meta name="theme-color" content="#1d211d">
    <meta property="og:title" content="$name — Contact">
    <meta property="og:description" content="$introduction">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://humblechuck.com/contact">
    <meta property="og:image" content="https://humblechuck.com/og.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>Contact — $name</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/styles.css">
    <script src="/site.js" defer></script>
  </head>
  <body class="contact-page">
    <a class="skip-link" href="#main">Skip to contact information</a>
    <header class="site-header">
      <a class="wordmark" href="/" aria-label="$name, home"><span class="mark" aria-hidden="true"><img src="/hc-logo.png" alt=""></span><span>$name</span></a>
      <nav aria-label="Primary navigation"><a href="/data">Data</a><a href="/music">Music</a><a class="nav-contact" aria-current="page" href="/contact">Contact</a></nav>
    </header>

    <main id="main">
      <section class="contact-hero" aria-labelledby="contact-title">
        <p class="eyebrow">Contact / Brooklyn, New York</p>
        <div class="contact-heading">
          <h1 id="contact-title">$headline</h1>
          <p>$introduction</p>
        </div>
        <a class="contact-email" href="$email_url">
          <span class="contact-accent" aria-hidden="true"><i></i><i></i></span>
          <span class="eyebrow">Email me</span>
          <strong>$email</strong>
          <span class="contact-arrow" aria-hidden="true">↗</span>
        </a>
      </section>
    </main>

    <footer><span>© <span data-year></span> $name</span><span><a href="/">Choose another path</a></span></footer>
  </body>
</html>
